name: promofy
description: App de promociones para restaurantes y entretenimiento en México.
publish_to: 'none'
version: 1.3.0+27

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5
  go_router: ^13.2.0
  google_maps_flutter: ^2.6.1
  geolocator: ^12.0.0
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0
  cached_network_image: ^3.3.1
  image_picker: ^1.2.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  font_awesome_flutter: ^10.7.0
  google_places_flutter: ^2.1.1
  http: ^1.2.0
  webview_flutter: ^4.7.0
  webview_flutter_android: ^3.16.0
  webview_flutter_wkwebview: ^3.14.0
  fl_chart: ^0.69.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3
  crypto: ^3.0.3
  app_links: ^6.3.1
  file_picker: ^8.1.2
  csv: ^6.0.0
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  background_color: "#F26522"
  # Fondo naranja en iOS al quitar transparencia (antes se aplanaba a blanco).
  background_color_ios: "#F26522"
  remove_alpha_channel: true
  remove_alpha_ios: true
  adaptive_icon_background: "#F26522"
  adaptive_icon_foreground: "assets/images/logo.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#F26522"
  image: assets/images/logo_white.png
  android: true
  ios: true
  android_12:
    color: "#F26522"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/